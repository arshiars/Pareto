services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: pareto-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # e.g. https://pareto-frontend.onrender.com
      - key: GATEWAY_PASSWORD
        sync: false          # the password users enter to access the app
      - key: GATEWAY_SECRET
        sync: false          # random secret for signing auth tokens
      - key: SUPABASE_URL
        sync: false          # https://mdborjnavqcinrjnqqsw.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # Supabase service role secret key
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-2
      - key: AWS_S3_BUCKET
        value: kingsett-tamberg-uploads

  # ── Pipeline Worker (Cron) ─────────────────────────────────────────────────
  - type: cron
    name: pareto-pipeline-worker
    runtime: node
    rootDir: backend
    buildCommand: npm install
    schedule: "*/5 * * * *"
    startCommand: node worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-2
      - key: AWS_S3_BUCKET
        value: kingsett-tamberg-uploads

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: pareto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://pareto-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false          # https://mdborjnavqcinrjnqqsw.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false          # Supabase publishable/anon key
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false          # Google Maps API key
      - key: VITE_MAPBOX_TOKEN
        sync: false          # Mapbox access token
