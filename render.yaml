services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: fundus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # e.g. https://fundus-frontend.onrender.com
      - key: GATEWAY_PASSWORD
        sync: false          # the password users enter to access the app
      - key: GATEWAY_SECRET
        sync: false          # random secret for signing auth tokens
      - key: SUPABASE_URL
        sync: false          # https://mdborjnavqcinrjnqqsw.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # Supabase service role secret key

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: fundus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://fundus-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false          # https://mdborjnavqcinrjnqqsw.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false          # Supabase publishable/anon key
